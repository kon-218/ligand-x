# RabbitMQ Configuration for RabbitMQ 3.13+
# Minimal, working configuration

# Memory management (60% of available memory)
vm_memory_high_watermark.relative = 0.6

# Heartbeat timeout (60 seconds)
heartbeat = 60

# Channel settings
channel_max = 2047

# Consumer timeout (2 hours = 7200000 ms)
# This allows long-running tasks like RBFE transformations
consumer_timeout = 7200000

# Network settings
tcp_listen_options.backlog = 4096

# Logging - suppress info messages to reduce verbosity
log.file.level = warning
log.console.level = warning

# Allow deprecated features without warnings
deprecated_features.permit.management_metrics_collection = true
deprecated_features.permit.transient_nonexcl_queues = true
