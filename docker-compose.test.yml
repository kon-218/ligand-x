# ============================================================
# Ligand-X Test Configuration
# ============================================================
# Test-specific overrides for running pytest integration tests.
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.test.yml up -d
#   pytest tests/
#   docker-compose -f docker-compose.yml -f docker-compose.test.yml down
#
# This file:
# - Uses ephemeral volumes (cleaned after tests)
# - Exposes ports for test access
# - Sets test-specific environment variables
# - Optionally reduces service count for faster startup
# ============================================================

services:
  # ============================================================
  # Infrastructure - Expose Ports for Test Access
  # ============================================================
  gateway:
    environment:
      - LOG_LEVEL=INFO
      - TESTING=true
    ports:
      - "8000:8000"
    # Remove resource limits for tests
    deploy:
      resources:
        limits: {}
        reservations: {}

  redis:
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits: {}
        reservations: {}

  postgres:
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ligandx_test
      - POSTGRES_PASSWORD=ligandx_test
      - POSTGRES_DB=ligandx_test
    # Use tmpfs for faster test database (data not persisted)
    tmpfs:
      - /var/lib/postgresql/data
    deploy:
      resources:
        limits: {}
        reservations: {}

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"
    deploy:
      resources:
        limits: {}
        reservations: {}

  # ============================================================
  # Services - Test Configuration
  # ============================================================
  structure:
    environment:
      - LOG_LEVEL=INFO
      - TESTING=true
    deploy:
      resources:
        limits: {}
        reservations: {}

  docking:
    environment:
      - LOG_LEVEL=INFO
      - TESTING=true
    # Use tmpfs for test outputs (faster, not persisted)
    tmpfs:
      - /app/data/docking_outputs
    deploy:
      resources:
        limits: {}
        reservations: {}

  md:
    environment:
      - LOG_LEVEL=INFO
      - TESTING=true
    tmpfs:
      - /app/data/md_outputs
    deploy:
      resources:
        limits: {}
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  qc:
    environment:
      - LOG_LEVEL=INFO
      - TESTING=true
      - CELERY_BROKER_URL=amqp://ligandx:ligandx@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://ligandx_test:ligandx_test@postgres:5432/ligandx_test
    tmpfs:
      - /app/data/qc_jobs
      - /app/data/qc_results_db
    deploy:
      resources:
        limits: {}
        reservations: {}

  # ============================================================
  # Workers - Test Configuration
  # ============================================================
  worker-qc:
    environment:
      - CELERY_BROKER_URL=amqp://ligandx:ligandx@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://ligandx_test:ligandx_test@postgres:5432/ligandx_test
      - CELERY_CONCURRENCY=1
    tmpfs:
      - /app/data/qc_jobs
      - /app/data/qc_results_db
    deploy:
      resources:
        limits: {}
        reservations: {}

  worker-gpu-short:
    environment:
      - CELERY_BROKER_URL=amqp://ligandx:ligandx@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://ligandx_test:ligandx_test@postgres:5432/ligandx_test
      - CELERY_CONCURRENCY=1
    tmpfs:
      - /app/data/md_outputs
    deploy:
      resources:
        limits: {}
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  worker-gpu-long:
    environment:
      - CELERY_BROKER_URL=amqp://ligandx:ligandx@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://ligandx_test:ligandx_test@postgres:5432/ligandx_test
      - CELERY_CONCURRENCY=1
    tmpfs:
      - /app/data/abfe_outputs
      - /app/data/rbfe_outputs
    deploy:
      resources:
        limits: {}
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  worker-cpu:
    environment:
      - CELERY_BROKER_URL=amqp://ligandx:ligandx@rabbitmq:5672/
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://ligandx_test:ligandx_test@postgres:5432/ligandx_test
      - CELERY_CONCURRENCY=2
    tmpfs:
      - /app/data/docking_outputs
    deploy:
      resources:
        limits: {}
        reservations: {}

  # ============================================================
  # Frontend - Not needed for backend tests
  # ============================================================
  frontend:
    profiles:
      - frontend-tests
    deploy:
      resources:
        limits: {}
        reservations: {}

  flower:
    profiles:
      - monitoring
    deploy:
      resources:
        limits: {}
        reservations: {}

# Use ephemeral volumes for tests (data not persisted between test runs)
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
