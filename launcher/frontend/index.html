<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligand-X Launcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <div class="logo-text">
                    <h1>Ligand-X</h1>
                    <span class="version">Launcher v1.0</span>
                </div>
            </div>
            <div class="status-indicator" id="dockerStatus">
                <span class="status-dot"></span>
                <span class="status-text">Checking...</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Status Panel -->
            <section class="panel status-panel">
                <h2>Services Status</h2>
                <div class="services-summary" id="servicesSummary">
                    <div class="summary-item">
                        <span class="summary-value" id="runningCount">0</span>
                        <span class="summary-label">Running</span>
                    </div>
                </div>
                <div class="services-grid" id="servicesGrid">
                    <span style="color: var(--text-dim); font-size: 11px;">No services running</span>
                </div>
            </section>

            <!-- Controls Panel -->
            <section class="panel controls-panel">
                <h2>Controls</h2>
                
                <div class="control-row">
                    <div class="control-group">
                        <label for="envMode">Environment</label>
                        <select id="envMode" class="select" onchange="onEnvModeChange()">
                            <option value="dev">Development</option>
                            <option value="prod">Production</option>
                        </select>
                    </div>
                </div>

                <div class="button-grid">
                    <button class="btn btn-primary" id="startBtn" onclick="startServices()">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        Start
                    </button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopServices()">
                        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                        Stop
                    </button>
                    <button class="btn btn-secondary" id="restartBtn" onclick="restartServices()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                        </svg>
                        Restart
                    </button>
                    <button class="btn btn-secondary" id="pullBtn" onclick="pullImages()">
                        <svg id="pullIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="7,10 12,15 17,10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Pull Images
                    </button>
                    <button class="btn btn-secondary" onclick="openFrontend()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M3 9h18"/>
                            <circle cx="6.5" cy="6" r="0.5" fill="currentColor"/>
                            <circle cx="9" cy="6" r="0.5" fill="currentColor"/>
                        </svg>
                        Open App
                    </button>
                </div>
            </section>

            <!-- Tab Strip -->
            <div class="tab-strip">
                <button class="tab-button active" data-tab="services">Services</button>
                <button class="tab-button" data-tab="logs">Logs</button>
                <button class="tab-button" data-tab="config">Config</button>
            </div>

            <!-- Services Panel (Tabbed) -->
            <section class="panel services-panel tab-content active" data-tab="services">
                <div id="servicesTabContent">
                    <p style="color: var(--text-dim); font-size: 12px;">Loading services...</p>
                </div>
            </section>

            <!-- Logs Panel (Tabbed) -->
            <section class="panel logs-panel tab-content" data-tab="logs">
                <div class="logs-header">
                    <h2>Logs</h2>
                    <div class="logs-controls">
                        <select id="logService" class="select select-sm" onchange="changeLogService()">
                            <option value="all">All Services</option>
                            <optgroup label="Core">
                                <option value="gateway">Gateway</option>
                                <option value="frontend">Frontend</option>
                                <option value="structure">Structure</option>
                                <option value="alignment">Alignment</option>
                                <option value="ketcher">Ketcher</option>
                                <option value="msa">MSA</option>
                            </optgroup>
                            <optgroup label="Computational">
                                <option value="docking">Docking</option>
                                <option value="md">MD</option>
                                <option value="admet">ADMET</option>
                                <option value="boltz2">Boltz2</option>
                                <option value="qc">QC</option>
                                <option value="abfe">ABFE</option>
                                <option value="rbfe">RBFE</option>
                            </optgroup>
                            <optgroup label="Workers">
                                <option value="worker-cpu">Worker CPU</option>
                                <option value="worker-gpu-short">Worker GPU Short</option>
                                <option value="worker-gpu-long">Worker GPU Long</option>
                                <option value="worker-qc">Worker QC</option>
                            </optgroup>
                            <optgroup label="Infrastructure">
                                <option value="postgres">PostgreSQL</option>
                                <option value="redis">Redis</option>
                                <option value="rabbitmq">RabbitMQ</option>
                                <option value="flower">Flower</option>
                            </optgroup>
                        </select>
                        <button class="btn btn-sm btn-ghost" onclick="clearLogs()">Clear</button>
                    </div>
                </div>
                <div class="logs-container" id="logsContainer">
                    <div class="log-placeholder">Logs will appear here...</div>
                </div>
            </section>
            <!-- Config Panel (Tabbed) -->
            <section class="panel tab-content" data-tab="config">
                <div class="logs-header">
                    <h2>.env Configuration</h2>
                    <button class="btn btn-sm btn-primary" onclick="saveEnvConfig()">Save</button>
                </div>
                <textarea id="envEditor" spellcheck="false" style="width: 100%; height: 420px; resize: vertical; font-family: monospace; font-size: 12px; background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 10px; box-sizing: border-box; outline: none;"></textarea>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <button class="footer-btn" onclick="selectProjectFolder()" title="Click to change project folder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                </svg>
                <span id="projectPath">Detecting...</span>
            </button>
<button class="footer-btn" onclick="cleanDocker()" title="Clean unused Docker resources">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3,6 5,6 21,6"/>
                    <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                </svg>
                Clean
            </button>
        </footer>
    </div>

    <!-- First-Run Wizard Overlay -->
    <div id="firstRunWizard" class="wizard-overlay hidden">
        <div class="wizard-container">
            <div class="wizard-header">
                <h2 class="wizard-title">Services</h2>
                <button class="wizard-close" onclick="dismissWizard()" title="Dismiss">✕</button>
            </div>

            <div class="wizard-scroll">
                <div class="wizard-cards" id="wizardServiceCards"></div>
            </div>

            <div class="wizard-footer">
                <div class="estimated-size" id="downloadSizeInfo">
                    Estimated download: <span id="estimatedSize">0</span> GB
                </div>
                <div class="estimated-size" id="readyNotice" style="display:none;color:var(--accent-success);">
                    ✓ All selected services are already downloaded
                </div>
            </div>

            <div id="pullErrorBanner" class="error-banner hidden">
                <span id="errorMessage"></span>
                <button class="btn btn-sm btn-primary" onclick="retryPullFailed()">Retry Failed</button>
            </div>

            <div class="wizard-actions">
                <button class="btn btn-primary" id="pullSetupBtn" onclick="startWizardPull()">Pull & Setup</button>
                <button class="btn btn-primary" id="skipPullBtn" onclick="skipWizardPull()" style="display:none;">Launch →</button>
            </div>

            <div id="pullProgressContainer" class="hidden">
                <div class="pull-progress-header">
                    <span id="pullGroupLabel">Pulling...</span>
                    <span id="pullImageCounter"></span>
                </div>
                <div class="progress-bar-track">
                    <div class="progress-bar-fill" id="pullOverallBar" style="width:0%"></div>
                </div>
                <div class="logs-container" id="wizardLogsContainer" style="height:180px;margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <script src="wailsjs/runtime/runtime.js"></script>
    <script src="wailsjs/go/main/App.js"></script>
    <script src="app.js"></script>
</body>
</html>
