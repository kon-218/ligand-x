<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligand-X Launcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
                <div class="logo-text">
                    <h1>Ligand-X</h1>
                    <span class="version">Launcher v1.0</span>
                </div>
            </div>
            <div class="status-indicator" id="dockerStatus">
                <span class="status-dot"></span>
                <span class="status-text">Checking...</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Status Panel -->
            <section class="panel status-panel">
                <h2>Services Status</h2>
                <div class="services-summary" id="servicesSummary">
                    <div class="summary-item">
                        <span class="summary-value" id="runningCount">0</span>
                        <span class="summary-label">Running</span>
                    </div>
                </div>
                <div class="services-grid" id="servicesGrid">
                    <span style="color: var(--text-dim); font-size: 11px;">No services running</span>
                </div>
            </section>

            <!-- Controls Panel -->
            <section class="panel controls-panel">
                <h2>Controls</h2>
                
                <div class="control-row">
                    <div class="control-group">
                        <label for="envMode">Environment</label>
                        <select id="envMode" class="select">
                            <option value="dev">Development</option>
                            <option value="prod">Production</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="servicePreset">Services</label>
                        <select id="servicePreset" class="select" onchange="onPresetChange()">
                            <option value="full">Full (All Services)</option>
                            <option value="core">Core Only</option>
                            <option value="docking">Core + Docking</option>
                            <option value="md">Core + MD</option>
                            <option value="qc">Core + QC</option>
                            <option value="free-energy">Free Energy</option>
                            <option value="gpu">GPU Stack</option>
                            <option value="custom">Custom...</option>
                        </select>
                    </div>
                </div>

                <div id="customServices" class="custom-services hidden">
                    <div class="custom-services-header">
                        <span>Select Services</span>
                        <button class="btn btn-xs btn-ghost" onclick="selectAllServices()">All</button>
                        <button class="btn btn-xs btn-ghost" onclick="selectNoServices()">None</button>
                    </div>
                    <div class="services-checkbox-grid">
                        <label class="service-checkbox core-service">
                            <input type="checkbox" value="postgres" checked disabled>
                            <span>PostgreSQL</span>
                        </label>
                        <label class="service-checkbox core-service">
                            <input type="checkbox" value="redis" checked disabled>
                            <span>Redis</span>
                        </label>
                        <label class="service-checkbox core-service">
                            <input type="checkbox" value="rabbitmq" checked disabled>
                            <span>RabbitMQ</span>
                        </label>
                        <label class="service-checkbox core-service">
                            <input type="checkbox" value="gateway" checked disabled>
                            <span>Gateway</span>
                        </label>
                        <label class="service-checkbox core-service">
                            <input type="checkbox" value="frontend" checked disabled>
                            <span>Frontend</span>
                        </label>
                        <label class="service-checkbox core-service">
                            <input type="checkbox" value="structure" checked disabled>
                            <span>Structure</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="ketcher" data-service>
                            <span>Ketcher</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="alignment" data-service>
                            <span>Alignment</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="msa" data-service>
                            <span>MSA</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="docking" data-service>
                            <span>Docking</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="md" data-service>
                            <span>MD</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="admet" data-service>
                            <span>ADMET</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="boltz2" data-service>
                            <span>Boltz2</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="qc" data-service>
                            <span>QC</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="abfe" data-service>
                            <span>ABFE</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="rbfe" data-service>
                            <span>RBFE</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="worker-cpu" data-service>
                            <span>Worker CPU</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="worker-gpu-short" data-service>
                            <span>Worker GPU Short</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="worker-gpu-long" data-service>
                            <span>Worker GPU Long</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="worker-qc" data-service>
                            <span>Worker QC</span>
                        </label>
                        <label class="service-checkbox">
                            <input type="checkbox" value="flower" data-service>
                            <span>Flower</span>
                        </label>
                    </div>
                </div>

                <div class="button-grid">
                    <button class="btn btn-primary" id="startBtn" onclick="startServices()">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        Start
                    </button>
                    <button class="btn btn-danger" id="stopBtn" onclick="stopServices()">
                        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
                        Stop
                    </button>
                    <button class="btn btn-secondary" id="restartBtn" onclick="restartServices()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
                            <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                        </svg>
                        Restart
                    </button>
                    <button class="btn btn-secondary" id="pullBtn" onclick="pullImages()">
                        <svg id="pullIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                            <polyline points="7,10 12,15 17,10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        Pull Images
                    </button>
                </div>
            </section>

            <!-- Quick Links -->
            <section class="panel links-panel">
                <h2>Quick Links</h2>
                <div class="links-grid">
                    <button class="link-btn" onclick="openFrontend()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M3 9h18"/>
                            <circle cx="6.5" cy="6" r="0.5" fill="currentColor"/>
                            <circle cx="9" cy="6" r="0.5" fill="currentColor"/>
                        </svg>
                        <span>Open App</span>
                        <small>localhost:3000</small>
                    </button>
                    <button class="link-btn" onclick="openAPI()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                            <polyline points="14,2 14,8 20,8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                        </svg>
                        <span>API Docs</span>
                        <small>localhost:8000</small>
                    </button>
                    <button class="link-btn" onclick="openFlower()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12,6 12,12 16,14"/>
                        </svg>
                        <span>Task Monitor</span>
                        <small>Flower UI</small>
                    </button>
                </div>
            </section>

            <!-- Logs Panel -->
            <section class="panel logs-panel">
                <div class="logs-header">
                    <h2>Logs</h2>
                    <div class="logs-controls">
                        <select id="logService" class="select select-sm" onchange="changeLogService()">
                            <option value="all">All Services</option>
                            <optgroup label="Core">
                                <option value="gateway">Gateway</option>
                                <option value="frontend">Frontend</option>
                                <option value="structure">Structure</option>
                                <option value="alignment">Alignment</option>
                                <option value="ketcher">Ketcher</option>
                                <option value="msa">MSA</option>
                            </optgroup>
                            <optgroup label="Computational">
                                <option value="docking">Docking</option>
                                <option value="md">MD</option>
                                <option value="admet">ADMET</option>
                                <option value="boltz2">Boltz2</option>
                                <option value="qc">QC</option>
                                <option value="abfe">ABFE</option>
                                <option value="rbfe">RBFE</option>
                            </optgroup>
                            <optgroup label="Workers">
                                <option value="worker-cpu">Worker CPU</option>
                                <option value="worker-gpu-short">Worker GPU Short</option>
                                <option value="worker-gpu-long">Worker GPU Long</option>
                                <option value="worker-qc">Worker QC</option>
                            </optgroup>
                            <optgroup label="Infrastructure">
                                <option value="postgres">PostgreSQL</option>
                                <option value="redis">Redis</option>
                                <option value="rabbitmq">RabbitMQ</option>
                                <option value="flower">Flower</option>
                            </optgroup>
                        </select>
                        <button class="btn btn-sm btn-ghost" onclick="clearLogs()">Clear</button>
                    </div>
                </div>
                <div class="logs-container" id="logsContainer">
                    <div class="log-placeholder">Logs will appear here...</div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <button class="footer-btn" onclick="selectProjectFolder()" title="Click to change project folder">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
                </svg>
                <span id="projectPath">Detecting...</span>
            </button>
<button class="footer-btn" onclick="cleanDocker()" title="Clean unused Docker resources">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3,6 5,6 21,6"/>
                    <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                </svg>
                Clean
            </button>
        </footer>
    </div>

    <script src="wailsjs/runtime/runtime.js"></script>
    <script src="wailsjs/go/main/App.js"></script>
    <script src="app.js"></script>
</body>
</html>
